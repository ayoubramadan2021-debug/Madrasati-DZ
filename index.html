<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07101f" />
    <title>تعليم — منصة التعليم الذكي الجزائرية</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #07101f;
        font-family: 'Tajawal', system-ui, sans-serif;
        transition: opacity .5s ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      .sp-logo {
        width: 92px; height: 92px; border-radius: 24px;
        background: linear-gradient(145deg, #1a3d73, #0c1e3a);
        border: 2px solid rgba(232,160,32,.4);
        display: grid; place-items: center;
        font-size: 46px;
        box-shadow: 0 8px 32px rgba(0,0,0,.5), 0 0 60px rgba(232,160,32,.15);
        animation: sp-pop .7s cubic-bezier(.34,1.56,.64,1);
      }
      .sp-title {
        margin-top: 20px;
        font-size: 30px; font-weight: 900;
        background: linear-gradient(135deg, #fff 30%, #E8A020 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: sp-fade .8s ease .2s both;
      }
      .sp-sub {
        margin-top: 6px; font-size: 13px; color: rgba(255,255,255,.45);
        animation: sp-fade .8s ease .4s both;
      }
      .sp-ring {
        margin-top: 26px;
        width: 30px; height: 30px;
        border: 3px solid rgba(232,160,32,.2);
        border-top-color: #E8A020;
        border-radius: 50%;
        animation: sp-spin .8s linear infinite;
      }
      @keyframes sp-pop { from { transform: scale(0) rotate(-20deg); opacity: 0 } to { transform: scale(1) rotate(0); opacity: 1 } }
      @keyframes sp-fade { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: translateY(0) } }
      @keyframes sp-spin { to { transform: rotate(360deg) } }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="sp-logo">🎓</div>
      <div class="sp-title">تعليم</div>
      <div class="sp-sub">منصة التعليم الذكي الجزائرية</div>
      <div class="sp-ring"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
